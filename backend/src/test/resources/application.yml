spring:
  application:
    name: seedo
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    baseline-on-migrate: true
    locations: classpath:db/migration
  security:
    oauth2:
      resourceserver:
        jwt:
          # 실제 JWT 검증은 다음 이슈에서 구현. 통합테스트는 보안 경로 안 탐.
          jwk-set-uri: http://test.invalid/jwks

server:
  port: 0
