# Fly.io 배포 설정. 첫 launch 후 일부 값은 `flyctl launch --copy-config` 가 자동 갱신할 수 있다.
#
# region 선택: `bom` (Mumbai) — Supabase 운영 DB 와 같은 지역. backend ↔ DB 왕복 ~5ms.
# 한국 사용자 → backend 는 ~140ms 추가되지만 DB 트랜잭션 안정성 우선.
#
# 시크릿은 이 파일에 절대 X. `flyctl secrets set` 으로 따로:
#   flyctl secrets set OPENAI_API_KEY=... SUPABASE_DB_PASSWORD=... ...

app = "seedo-backend"
primary_region = "bom"

[build]
  # Dockerfile 기반 빌드 — buildpack 안 씀.

[http_service]
  internal_port = 8080
  force_https = true

  # auto_stop_machines=off — JVM cold start (10~20초) 가 사용자에게 매번 보이지 않게 always-on.
  # 비용 절감이 더 중요해지면 "stop" 으로 바꾸고 idle 시 자동 종료. 단 첫 요청 부담 큼.
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    hard_limit = 200
    soft_limit = 150

[[vm]]
  size = "shared-cpu-1x"
  memory = "1gb"          # JVM heap (~750MB) + 메타데이터 + 네티 buffer 여유
  cpu_kind = "shared"
  cpus = 1
