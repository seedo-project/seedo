name: "🐛 Bug Report"
description: "발견된 버그나 오류를 보고할 때 사용합니다."
title: "[Fix] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        ## 🚨 버그 상황
        어떤 버그가 발생했는지 상세히 설명해주세요.
  - type: textarea
    id: reproduction
    attributes:
      label: "🔁 재현 방법"
      placeholder: "1. 어디로 들어간다.\n2. 무엇을 클릭한다.\n3. 에러가 발생한다."
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: "💡 예상 결과"
      placeholder: "정상적으로 작동했을 때의 모습을 적어주세요."
  - type: textarea
    id: screenshots
    attributes:
      label: "📸 스크린샷 (선택)"
      description: "에러 로그나 화면 캡처가 있다면 첨부해주세요."
